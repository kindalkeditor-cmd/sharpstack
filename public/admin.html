<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Sharp-Stack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f5f7;--surface:#fff;--border:#d2d2d7;--black:#1d1d1f;--mid:#6e6e73;--gold:#b8892a;--gold-bg:#fdf6e8;--green:#2a9d5c;--red:#e25;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--black);min-height:100vh;}
nav{border-bottom:0.5px solid var(--border);padding:18px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,245,247,0.92);backdrop-filter:blur(16px);position:sticky;top:0;z-index:10;}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;}
.logo em{font-style:normal;color:var(--gold);}
.admin-badge{background:var(--black);color:#fff;font-size:0.62rem;padding:3px 10px;border-radius:20px;letter-spacing:0.1em;}
.wrap{max-width:1100px;margin:0 auto;padding:40px 48px;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-card{background:var(--surface);border:0.5px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center;}
.login-card h2{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;margin-bottom:8px;}
.login-card p{font-size:0.85rem;color:var(--mid);margin-bottom:24px;}
.field{margin-bottom:14px;text-align:left;}
.field label{display:block;font-size:0.7rem;color:var(--mid);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.field input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:var(--black);outline:none;}
.field input:focus{border-color:var(--black);}
.btn-primary{width:100%;background:var(--black);color:#fff;border:none;padding:13px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:0.85rem;cursor:pointer;margin-top:8px;}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;}
.err{color:var(--red);font-size:0.78rem;margin-top:10px;}

/* DASHBOARD */
#dashboard{display:none;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:32px;}
.stat{background:var(--surface);border:0.5px solid var(--border);border-radius:14px;padding:20px;}
.stat-label{font-size:0.68rem;color:var(--mid);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.stat-value{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--black);}
.stat-value.gold{color:var(--gold);}
.stat-value.green{color:var(--green);}

.section{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;}
.section-head{padding:16px 20px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.section-head h3{font-size:0.88rem;font-weight:500;}
.search-input{background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:0.78rem;font-family:'DM Sans',sans-serif;color:var(--black);outline:none;width:220px;}

table{width:100%;border-collapse:collapse;}
th{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);padding:10px 20px;text-align:left;border-bottom:0.5px solid var(--border);}
td{padding:12px 20px;font-size:0.82rem;border-bottom:0.5px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}

.badge{display:inline-block;font-size:0.62rem;padding:2px 8px;border-radius:10px;font-weight:500;}
.badge.pro{background:#e8f5ee;color:#1a7a45;}
.badge.free{background:var(--bg);color:var(--mid);}

.action-btn{background:none;border:0.5px solid var(--border);border-radius:8px;padding:4px 10px;font-size:0.72rem;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--mid);margin-right:4px;}
.action-btn:hover{border-color:var(--black);color:var(--black);}
.action-btn.danger{color:var(--red);}
.action-btn.danger:hover{border-color:var(--red);}
.action-btn.success{color:var(--green);}
.action-btn.success:hover{border-color:var(--green);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:20px;padding:32px;max-width:400px;width:100%;}
.modal h3{font-size:1rem;font-weight:500;margin-bottom:8px;}
.modal p{font-size:0.82rem;color:var(--mid);margin-bottom:20px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:none;border:0.5px solid var(--border);border-radius:10px;padding:8px 16px;font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-confirm{background:var(--black);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:0.82rem;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-confirm.danger{background:var(--red);}

.toast{position:fixed;bottom:24px;right:24px;background:var(--black);color:#fff;padding:10px 20px;border-radius:12px;font-size:0.82rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;}

@media(max-width:700px){
  .wrap{padding:24px;}
  nav{padding:16px 24px;}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Sharp<em>-Stack</em> <span class="admin-badge">Admin</span></div>
  <button class="action-btn" id="logoutBtn" style="display:none" onclick="adminLogout()">Sign out</button>
</nav>

<!-- LOGIN -->
<div id="loginScreen" class="wrap">
  <div class="login-card">
    <h2>Admin Access</h2>
    <p>Sign in with your admin account</p>
    <div class="field"><label>Email</label><input type="email" id="adminEmail" placeholder="amadejgkladnik@gmail.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="adminPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')adminLogin()"/></div>
    <button class="btn-primary" id="loginBtn" onclick="adminLogin()">Sign in →</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="wrap">
  <div class="stats-grid">
    <div class="stat"><div class="stat-label">Total users</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat"><div class="stat-label">Pro users</div><div class="stat-value gold" id="statPro">—</div></div>
    <div class="stat"><div class="stat-label">Free users</div><div class="stat-value" id="statFree">—</div></div>
    <div class="stat"><div class="stat-label">MRR (est.)</div><div class="stat-value green" id="statMRR">—</div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <h3>Users</h3>
      <input class="search-input" id="searchInput" placeholder="Search by email..." oninput="filterUsers()"/>
    </div>
    <table>
      <thead><tr><th>Email</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody id="usersTable"></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg"></p>
    <div id="modalInputWrap" style="display:none;margin-bottom:16px;">
      <input class="search-input" style="width:100%;padding:10px 14px;" id="modalInput" placeholder="New password"/>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modalConfirm">Confirm</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_EMAIL='amadejgkladnik@gmail.com';
let adminToken=localStorage.getItem('ss_admin_token')||null;
let allUsers=[];

function showToast(msg,success=true){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=success?'#1d1d1f':'#e25';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

async function adminLogin(){
  const email=document.getElementById('adminEmail').value.trim();
  const password=document.getElementById('adminPassword').value;
  if(email!==ADMIN_EMAIL){document.getElementById('loginErr').textContent='Access denied.';return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    const res=await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(data.error){document.getElementById('loginErr').textContent=data.error;btn.disabled=false;btn.textContent='Sign in →';return;}
    adminToken=data.token;
    localStorage.setItem('ss_admin_token',adminToken);
    showDashboard();
  }catch(e){document.getElementById('loginErr').textContent='Something went wrong.';btn.disabled=false;btn.textContent='Sign in →';}
}

function adminLogout(){
  localStorage.removeItem('ss_admin_token');
  adminToken=null;
  document.getElementById('dashboard').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('logoutBtn').style.display='none';
}

async function showDashboard(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('logoutBtn').style.display='block';
  await loadUsers();
}

async function loadUsers(){
  try{
    const res=await fetch('/admin/users',{method:'GET',headers:{'Authorization':'Bearer '+adminToken}});
    const data=await res.json();
    if(data.error){showToast(data.error,false);return;}
    allUsers=data.users||[];
    renderStats();
    renderUsers(allUsers);
  }catch(e){showToast('Failed to load users',false);}
}

function renderStats(){
  const total=allUsers.length;
  const pro=allUsers.filter(u=>u.is_pro).length;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statPro').textContent=pro;
  document.getElementById('statFree').textContent=total-pro;
  document.getElementById('statMRR').textContent='€'+(pro*9);
}

function renderUsers(users){
  const tbody=document.getElementById('usersTable');
  if(!users.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--mid);padding:24px;">No users found</td></tr>';return;}
  tbody.innerHTML=users.map(u=>`
    <tr>
      <td>${u.email}</td>
      <td><span class="badge ${u.is_pro?'pro':'free'}">${u.is_pro?'⭐ Pro':'Free'}</span></td>
      <td>${new Date(u.created_at).toLocaleDateString('en-GB')}</td>
      <td>
        <button class="action-btn ${u.is_pro?'danger':'success'}" onclick="togglePro('${u.id}','${u.email}',${u.is_pro})">${u.is_pro?'Remove Pro':'Give Pro'}</button>
        <button class="action-btn" onclick="resetPassword('${u.id}','${u.email}')">Reset password</button>
        <button class="action-btn danger" onclick="deleteUser('${u.id}','${u.email}')">Delete</button>
      </td>
    </tr>`).join('');
}

function filterUsers(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  renderUsers(allUsers.filter(u=>u.email.toLowerCase().includes(q)));
}

function togglePro(id,email,isPro){
  const m=document.getElementById;
  m('modalTitle').textContent=isPro?`Remove Pro from ${email}`:`Give Pro to ${email}`;
  m('modalMsg').textContent=isPro?'This will downgrade them to the free plan.':'This will give them unlimited access for free.';
  m('modalInputWrap').style.display='none';
  m('modalConfirm').className=isPro?'btn-confirm danger':'btn-confirm';
  m('modalConfirm').textContent='Confirm';
  m('modalConfirm').onclick=async()=>{
    closeModal();
    try{
      const res=await fetch('/admin/toggle-pro',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},body:JSON.stringify({userId:id,isPro:!isPro})});
      const data=await res.json();
      if(data.success){showToast(isPro?'Pro removed':'Pro granted!');await loadUsers();}
      else showToast(data.error||'Failed',false);
    }catch(e){showToast('Error',false);}
  };
  document.getElementById('modalOverlay').classList.add('show');
}

function resetPassword(id,email){
  const m=document.getElementById;
  m('modalTitle').textContent=`Reset password for ${email}`;
  m('modalMsg').textContent='Enter a new password for this user.';
  m('modalInputWrap').style.display='block';
  m('modalInput').value='';
  m('modalConfirm').className='btn-confirm';
  m('modalConfirm').textContent='Reset password';
  m('modalConfirm').onclick=async()=>{
    const newPass=m('modalInput').value.trim();
    if(!newPass||newPass.length<6){showToast('Password must be 6+ characters',false);return;}
    closeModal();
    try{
      const res=await fetch('/admin/reset-password',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},body:JSON.stringify({userId:id,password:newPass})});
      const data=await res.json();
      if(data.success)showToast('Password reset!');
      else showToast(data.error||'Failed',false);
    }catch(e){showToast('Error',false);}
  };
  document.getElementById('modalOverlay').classList.add('show');
}

function deleteUser(id,email){
  const m=document.getElementById;
  m('modalTitle').textContent=`Delete ${email}?`;
  m('modalMsg').textContent='This is permanent and cannot be undone.';
  m('modalInputWrap').style.display='none';
  m('modalConfirm').className='btn-confirm danger';
  m('modalConfirm').textContent='Delete user';
  m('modalConfirm').onclick=async()=>{
    closeModal();
    try{
      const res=await fetch('/admin/delete-user',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+adminToken},body:JSON.stringify({userId:id})});
      const data=await res.json();
      if(data.success){showToast('User deleted');await loadUsers();}
      else showToast(data.error||'Failed',false);
    }catch(e){showToast('Error',false);}
  };
  document.getElementById('modalOverlay').classList.add('show');
}

if(adminToken){showDashboard();}
</script>
</body>
</html>
