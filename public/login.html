<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Sharp-Stack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f5f5f7;--surface:#fff;--border:#d2d2d7;--black:#1d1d1f;--mid:#6e6e73;--gold:#b8892a;--gold-bg:#fdf6e8;}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--black);min-height:100vh;display:flex;flex-direction:column;}
nav{border-bottom:0.5px solid var(--border);padding:18px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,245,247,0.92);backdrop-filter:blur(16px);}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--black);text-decoration:none;}
.logo em{font-style:normal;color:var(--gold);}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:24px;padding:40px;width:100%;max-width:400px;}
.card-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;margin-bottom:8px;}
.card-sub{font-size:0.85rem;color:var(--mid);margin-bottom:28px;font-weight:300;}
.tabs{display:flex;gap:0;margin-bottom:28px;border:0.5px solid var(--border);border-radius:12px;overflow:hidden;}
.tab{flex:1;padding:10px;text-align:center;font-size:0.8rem;cursor:pointer;background:transparent;border:none;font-family:'DM Sans',sans-serif;color:var(--mid);transition:all 0.2s;}
.tab.active{background:var(--black);color:#fff;}
.field{margin-bottom:16px;}
label{display:block;font-size:0.72rem;color:var(--mid);margin-bottom:6px;letter-spacing:0.05em;text-transform:uppercase;}
input{width:100%;background:var(--bg);border:0.5px solid var(--border);border-radius:12px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--black);outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--black);}
.btn{width:100%;background:var(--black);color:#fff;border:none;padding:14px;border-radius:16px;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;margin-top:8px;transition:opacity 0.2s;}
.btn:hover{opacity:0.75;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.error{color:#e25;font-size:0.78rem;margin-top:12px;text-align:center;display:none;}
.success{color:#2a9d5c;font-size:0.78rem;margin-top:12px;text-align:center;display:none;}
.divider{text-align:center;font-size:0.72rem;color:var(--mid);margin:16px 0;}
.back{display:block;text-align:center;font-size:0.78rem;color:var(--mid);margin-top:16px;text-decoration:none;}
.back:hover{color:var(--black);}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Sharp<em>-Stack</em></a>
</nav>
<div class="wrap">
  <div class="card">
    <div class="card-title">Welcome back.</div>
    <div class="card-sub">Sign in to access your Pro extractions.</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign in</button>
      <button class="tab" onclick="switchTab('register')">Create account</button>
    </div>
    <div id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••"/></div>
      <button class="btn" id="loginBtn" onclick="login()">Sign in →</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"/></div>
      <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="Min. 6 characters"/></div>
      <button class="btn" id="registerBtn" onclick="register()">Create account →</button>
    </div>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <a href="/" class="back">← Back to Sharp-Stack</a>
  </div>
</div>
<script>
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1)));
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showError('Please fill in all fields.');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) { showError(data.error); btn.disabled = false; btn.textContent = 'Sign in →'; return; }
    localStorage.setItem('ss_token', data.token);
    localStorage.setItem('ss_email', data.user.email);
    localStorage.setItem('ss_pro', data.user.isPro ? '1' : '0');
    window.location.href = '/';
  } catch (e) {
    showError('Something went wrong. Try again.');
    btn.disabled = false; btn.textContent = 'Sign in →';
  }
}

async function register() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!email || !password) return showError('Please fill in all fields.');
  if (password.length < 6) return showError('Password must be at least 6 characters.');
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) { showError(data.error); btn.disabled = false; btn.textContent = 'Create account →'; return; }
    if (data.token) {
      localStorage.setItem('ss_token', data.token);
      localStorage.setItem('ss_email', data.user.email);
      window.location.href = '/';
    } else {
      showSuccess('Account created! Please check your email to confirm, then sign in.');
      btn.disabled = false; btn.textContent = 'Create account →';
    }
  } catch (e) {
    showError('Something went wrong. Try again.');
    btn.disabled = false; btn.textContent = 'Create account →';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('loginForm').style.display !== 'none';
    if (loginVisible) login(); else register();
  }
});
</script>
</body>
</html>
